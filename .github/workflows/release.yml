name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node / Bun ──────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('ui/bun.lockb') }}
          restore-keys: bun-

      # Hijack node/npm/npx → bun.
      # Astro's Node.js version check is bypassed since bun handles all execution.
      - name: Hijack node/npm/npx → bun
        run: |
          mkdir -p ~/.bun-hijack
          ln -sf "$(which bun)" ~/.bun-hijack/node
          ln -sf "$(which bun)" ~/.bun-hijack/npm
          ln -sf "$(which bunx)" ~/.bun-hijack/npx
          echo "$HOME/.bun-hijack" >> $GITHUB_PATH

      - name: Build UI
        working-directory: ./ui
        run: |
          bun install --frozen-lockfile
          bun run build

      # ── Rust ────────────────────────────────────────────────────────────────
      - name: Setup Rust (stable + musl targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      # Swatinem/rust-cache must come AFTER toolchain setup.
      - name: Cache Cargo registry & build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-musl

      # zigbuild uses Zig as the cross-linker:
      # - No Docker (bun is available on host PATH)
      # - No GLIBC mismatch (Zig handles the ABI boundary)
      - name: Install Zig & cargo-zigbuild
        run: |
          sudo snap install zig --classic --beta
          cargo install cargo-zigbuild --locked

      # ── Builds ──────────────────────────────────────────────────────────────
      - name: Build x86_64-unknown-linux-musl
        env:
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          cargo zigbuild --release --target x86_64-unknown-linux-musl
          mv target/x86_64-unknown-linux-musl/release/lopala lopala-linux-x64

      - name: Build aarch64-unknown-linux-musl
        env:
          RUSTFLAGS: "-C debuginfo=0"
        run: |
          cargo zigbuild --release --target aarch64-unknown-linux-musl
          mv target/aarch64-unknown-linux-musl/release/lopala lopala-linux-arm64

      # ── Release ─────────────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lopala-linux-x64
            lopala-linux-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}